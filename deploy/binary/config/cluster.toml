# Three-node orb-chrysa Raft cluster.
# Run one instance on each host with HOSTNAME set to orb-chrysa-{0,1,2}.
#
#   HOSTNAME=orb-chrysa-0 orb-chrysa-server --config cluster.toml
#   HOSTNAME=orb-chrysa-1 orb-chrysa-server --config cluster.toml
#   HOSTNAME=orb-chrysa-2 orb-chrysa-server --config cluster.toml

[server]
listen = "0.0.0.0:5050"

[server.limits]
max_concurrent_uploads = 64
max_concurrent_requests = 512

[storage.s3]
endpoint = "http://<s3-endpoint>:9000"
bucket = "orb-chrysa"
region = "us-east-1"
access_key = "orb-chrysa"
secret_key = "change-me-in-production"
path_style = true

[storage.s3.redirect]
enabled = false

[raft]
listen = "0.0.0.0:5051"
data_dir = "./data/raft"
discovery_dns = "orb-chrysa"
