apiVersion: v1
kind: Service
metadata:
  name: {{ include "orb-chrysa.fullname" . }}
  namespace: {{ include "orb-chrysa.namespace" . }}
  labels:
    {{- include "orb-chrysa.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.sessionAffinity }}
  sessionAffinity: {{ . }}
  {{- end }}
  {{- if and (eq .Values.service.sessionAffinity "ClientIP") .Values.service.sessionAffinityConfig }}
  sessionAffinityConfig:
    {{- toYaml .Values.service.sessionAffinityConfig | nindent 4 }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "orb-chrysa.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: registry
      port: {{ .Values.service.port }}
      targetPort: registry
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orb-chrysa.fullname" . }}-headless
  namespace: {{ include "orb-chrysa.namespace" . }}
  labels:
    {{- include "orb-chrysa.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: {{ include "orb-chrysa.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: raft
      port: {{ .Values.service.raftPort }}
      targetPort: raft
